version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: catalog-postgres
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
    ports:
      - "5432:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalog-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/catalog_db
      DB_USERNAME: catalog_user
      DB_PASSWORD: catalog_pass
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  catalog_db_data:
